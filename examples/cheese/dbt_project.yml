name: "cheese"
version: "1.0.0"
config-version: 2

profile: "cheese"

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
target-path: "target"

models:
  cheese:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
      # Humbert's public-only guard exposes a metric only if every model it
      # reads is classified `open`. The marts layer is the governed public slice.
      +meta:
        classification: open

seeds:
  cheese:
    +schema: staging
